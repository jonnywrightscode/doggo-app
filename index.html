<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doggo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul class="nav-list">
                <li>
                    <h1>🐕 Doggo App</h1>
                </li>
                <li>
                    <label for="breed">Choose a breed:</label>
                    <select id="breed"></select>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <img id="main" class="main-image" src="" alt="image of a dog">
            <span id="loader" class="loading-dog show">🐶</span>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
